<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PMInfo 四个 Tab 接口清单 - 投研 Review</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --line: #d9e0ea;
      --line-strong: #b7c2d0;
      --primary: #145b7d;
      --primary-soft: #e8f3f8;
      --p0: #0f766e;
      --p0-bg: #e6f7f5;
      --p1: #9a5b00;
      --p1-bg: #fff4dc;
      --p2: #64748b;
      --p2-bg: #eef2f7;
      --ignore: #9f1239;
      --ignore-bg: #ffe7ed;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    header {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #334155;
      font-size: 12px;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 20px;
    }

    .summary-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .summary-card strong {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .summary-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.35;
    }

    .priority {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .priority.p0 { color: var(--p0); background: var(--p0-bg); }
    .priority.p1 { color: var(--p1); background: var(--p1-bg); }
    .priority.p2 { color: var(--p2); background: var(--p2-bg); }

    .nav {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 8px;
      padding: 10px 0;
      background: rgba(246, 247, 249, 0.94);
      backdrop-filter: blur(8px);
      margin-bottom: 12px;
    }

    .nav a {
      text-decoration: none;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid #c9e1ec;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 13px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      margin: 18px 0;
      overflow: visible;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .counts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
      justify-content: flex-end;
      min-width: 220px;
    }

    .table-wrap {
      overflow-x: auto;
      overflow-y: visible;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1180px;
    }

    th {
      z-index: 2;
      background: #eef4f8;
      color: #223142;
      text-align: left;
      font-size: 12px;
      line-height: 1.35;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line-strong);
      white-space: nowrap;
    }

    td {
      vertical-align: top;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    tr:nth-child(even) td { background: #fbfcfe; }
    tr.ignored td { background: var(--ignore-bg); }

    .module {
      font-weight: 700;
      color: #263442;
      white-space: nowrap;
    }

    .function {
      min-width: 260px;
      font-weight: 600;
    }

    code {
      display: inline-block;
      max-width: 360px;
      color: #1e3a5f;
      background: #eef4fb;
      border: 1px solid #d7e5f3;
      border-radius: 5px;
      padding: 1px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      white-space: normal;
      word-break: break-all;
    }

    .api {
      font-weight: 700;
      color: #0f3e5a;
    }

    .note {
      color: #334155;
      min-width: 240px;
    }

    .status {
      display: inline-block;
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      color: var(--primary);
      background: var(--primary-soft);
      margin-bottom: 6px;
    }

    .status.ignore {
      color: var(--ignore);
      background: var(--ignore-bg);
    }

    .status.compat {
      color: #475569;
      background: #e9eef5;
    }

    footer {
      color: var(--muted);
      font-size: 12px;
      margin-top: 24px;
    }

    @media (max-width: 980px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .section-head { flex-direction: column; }
      .counts { justify-content: flex-start; }
    }

    @media print {
      body { background: #fff; }
      .page { max-width: none; padding: 0; }
      header, .summary-card, .section { box-shadow: none; }
      .nav { display: none; }
      th { position: static; }
      .section { break-inside: avoid; page-break-inside: avoid; }
    }
  </style>
</head>

          ["P1", "投顾/赛道相关性", "同一赛道内投顾/基金公司收益相关性；股票多头用基准超额收益，其他策略用收益率。", "pm_adviser_track_correlation", "zmpmapi/advistor/yield_corr_track", "pm_id、strategy_type，可选 end_date/compare_begin_date/bench_id", "compare_end_date 由 SDK 默认等于 end_date"],
          ["P1", "赛道相关性序列", "赛道平均收益之间的 13 周滚动相关性序列；股票多头先扣基准收益。", "pm_adviser_track_correlation_trend", "zmpmapi/advistor/yield_corr_sequence_track", "pm_id、strategy_type，可选 end_date/bench_id", "compare_end_date 由 SDK 默认等于 end_date"],
          ["P1", "投顾相关性", "按投顾/基金公司合成净值后计算收益相关性；股票多头用基准超额收益，其他策略用收益率。", "pm_adviser_correlation", "zmpmapi/advistor/yield_corr_advistor", "pm_id、strategy_type，可选 end_date/compare_begin_date/bench_id", "股票多头最好传 bench_id"],
          ["P0", "持仓因子分析-基金", "获取子基金风险因子暴露。", "pm_risk_factor_exposure", "zmpmapi/factor/risk_factor_exposure", "pm_id、strategy_type，可选日期", "与风险配置共用"],
          ["P1", "持仓因子敏感性-投顾", "投顾截面市场敏感性，输出投顾简称、仓位超低配、大小盘、成长价值、基差。", "pm_adviser_factor_sensitivity", "zmpmapi/factor/adviser_factor_sensitivity", "pm_id，可选 end_date", "与风险配置共用；服务端不接收 strategy_type"],
          ["P2", "债券持仓暴露/同类对比", "前端指向的债券持仓暴露/同类对比接口。", "no wrapper", "zmpmapi/fund_similar/fund_exposure", "不暴露", "已确认忽略，当前服务端缺失 route"],
          ["P2", "持仓行业暴露/同类对比", "前端指向的持仓行业暴露/同类对比接口。", "no wrapper", "zmpmapi/fund_similar/fund_exposure_industry", "不暴露", "已确认忽略，当前服务端缺失 route"],
          ["P1", "持仓大类暴露", "子基金大类资产暴露截面和持仓比例加权平均。", "pm_holding_asset_exposure_by_fund", "zmpmapi/risk_control/risk_exposure_asset_by_fund", "pm_id、strategy_type，可选 end_date", "建议复用风险配置 pm_risk_asset_exposure_by_fund"],
          ["P1", "持仓风格暴露", "子基金风格暴露截面、组合加权平均、比较基准和偏离。", "pm_holding_style_exposure_by_fund", "zmpmapi/risk_control/risk_exposure_style_by_fund", "pm_id、strategy_type、bench_id，可选 end_date", "建议复用风险配置 pm_risk_style_exposure_by_fund"]
        ]
      }
    ];

    const priorityClass = (p) => p.toLowerCase();
    const priorityText = { P0: "P0", P1: "P1", P2: "P2" };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderSummary() {
      const allRows = sections.flatMap((section) => section.rows);
      const counts = allRows.reduce((acc, row) => {
        acc[row[0]] = (acc[row[0]] || 0) + 1;
        return acc;
      }, {});

      const cards = [
        ["4", "业务 Tab"],
        [String(allRows.length), "接口记录"],
        [String((counts.P0 || 0) + (counts.P1 || 0)), "首批进入 P0 + P1"],
        [String(counts.P2 || 0), "不进入 / 忽略"]
      ];

      document.getElementById("summary").innerHTML = cards.map(([value, label]) => `
        <div class="summary-card">
          <strong>${escapeHtml(value)}</strong>
          <span>${escapeHtml(label)}</span>
        </div>
      `).join("");
    }

    function renderSections() {
      const html = sections.map((section) => {
        const counts = section.rows.reduce((acc, row) => {
          acc[row[0]] = (acc[row[0]] || 0) + 1;
          return acc;
        }, {});

        const countChips = ["P0", "P1", "P2"].map((p) => `
          <span class="chip"><span class="priority ${priorityClass(p)}">${p}</span>${counts[p] || 0}</span>
        `).join("");

        const rows = section.rows.map((row) => {
          const [priority, module, fn, api, endpoint, params, note] = row;
          const ignored = priority === "P2" || api === "no wrapper";
          const statusClass = ignored ? "ignore" : (note.includes("兼容") ? "compat" : "");
          const statusText = ignored ? "不进入" : (priority === "P1" ? "增强进入" : "首批进入");
          return `
            <tr class="${ignored ? "ignored" : ""}">
              <td><span class="priority ${priorityClass(priority)}">${priorityText[priority]}</span></td>
              <td class="module">${escapeHtml(module)}</td>
              <td class="function">${escapeHtml(fn)}</td>
              <td><code class="api">${escapeHtml(api)}</code></td>
              <td><code>${escapeHtml(endpoint)}</code></td>
              <td>${escapeHtml(params)}</td>
              <td class="note"><span class="status ${statusClass}">${statusText}</span><br>${escapeHtml(note)}</td>
            </tr>
          `;
        }).join("");

        return `
          <section class="section" id="${section.id}">
            <div class="section-head">
              <div>
                <h2>${escapeHtml(section.title)}</h2>
                <p>${escapeHtml(section.description)}</p>
              </div>
              <div class="counts">${countChips}</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>优先级</th>
                    <th>页面模块</th>
                    <th>接口语义(功能)</th>
                    <th>建议 API</th>
                    <th>技术接口</th>
                    <th>业务/Skills 参数</th>
                    <th>进入范围与说明</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </section>
        `;
      }).join("");

      document.getElementById("sections").innerHTML = html;
    }

    renderSummary();
    renderSections();
  </script>
</body>
</html>
